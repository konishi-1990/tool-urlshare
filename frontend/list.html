<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 一覧 — URL 共有ツール</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Layout ─────────────────────────────────── */
    body { display: flex; flex-direction: column; }

    .app-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-header-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 16px; font-weight: 700; color: var(--text);
    }
    .app-header-title span { font-size: 20px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }

    /* ── Filter tabs ─────────────────────────────── */
    .filter-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex; gap: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-tab {
      flex-shrink: 0;
      padding: 12px 16px;
      font-size: 13px; font-weight: 600;
      color: var(--text-muted);
      border: none; background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      font-family: inherit;
    }
    .filter-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .filter-tab:hover:not(.active) { color: var(--text); }

    /* ── Main content ────────────────────────────── */
    .content {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 88px; /* FAB に被らないよう */
    }

    /* ── URL Card ─────────────────────────────────── */
    .url-card {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .url-card-header { display: flex; gap: 12px; align-items: flex-start; }

    .url-thumbnail {
      width: 64px; height: 48px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .url-thumbnail-placeholder {
      width: 64px; height: 48px;
      border-radius: 6px;
      background: var(--primary-soft);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: var(--primary);
      border: 1px solid rgba(37,99,235,.15);
    }

    .url-card-body { flex: 1; min-width: 0; }

    .url-card-title {
      font-size: 14px; font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .url-card-domain {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .url-card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .url-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }

    .url-card-actions { display: flex; gap: 6px; }

    /* ── FAB ──────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 24px; right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 26px; line-height: 1;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(37,99,235,.45);
      transition: background .15s, transform .15s;
      z-index: 90;
    }
    .fab:hover { background: var(--primary-dark); transform: scale(1.05); }
    .fab:active { transform: scale(.96); }

    /* ── Add URL sheet ────────────────────────────── */
    .sheet-form { display: flex; flex-direction: column; gap: 16px; }

    /* ── Skeleton loader ──────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skeleton-card { padding: 14px 16px; }
    .skeleton-row { height: 14px; margin-bottom: 8px; }

    @media (min-width: 600px) {
      .content { max-width: 640px; margin: 0 auto; width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header class="app-header">
    <div class="app-header-title">
      <span>🔗</span> URL 共有ツール
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" id="logout-btn">ログアウト</button>
    </div>
  </header>

  <!-- フィルタータブ -->
  <nav class="filter-bar" id="filter-bar">
    <button class="filter-tab active" data-status="">すべて</button>
    <button class="filter-tab" data-status="temporary">あとで読む</button>
    <button class="filter-tab" data-status="bookmarked">ブックマーク</button>
  </nav>

  <!-- URL リスト -->
  <main class="content" id="content">
    <!-- JS で描画 -->
  </main>

  <!-- URL 追加 FAB -->
  <button class="fab" id="fab" title="URL を追加">＋</button>

  <!-- URL 追加シート -->
  <div class="overlay" id="add-sheet">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">URL を追加</div>
      <form class="sheet-form" id="add-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="add-url">URL</label>
          <input class="form-input" type="url" id="add-url"
                 placeholder="https://example.com/..." autocomplete="off" required>
          <span class="form-error" id="add-url-error"></span>
        </div>
        <div class="form-group">
          <label class="form-label">保存方法</label>
          <div style="display:flex;gap:8px;">
            <label style="flex:1;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;">
              <input type="radio" name="add-status" value="temporary" checked>
              あとで読む
            </label>
            <label style="flex:1;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;">
              <input type="radio" name="add-status" value="bookmarked">
              ブックマーク
            </label>
          </div>
        </div>
        <div class="form-error" id="add-form-error"></div>
        <div style="display:flex;gap:10px;">
          <button type="button" class="btn btn-ghost btn-block" id="add-cancel-btn">キャンセル</button>
          <button type="submit" class="btn btn-primary btn-block" id="add-submit-btn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    requireAuth();

    let currentStatus = '';
    const content = document.getElementById('content');

    // ── フィルタータブ ──
    document.getElementById('filter-bar').addEventListener('click', (e) => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentStatus = tab.dataset.status;
      loadUrls();
    });

    // ── ドメイン抽出 ──
    function getDomain(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); }
      catch { return url; }
    }

    // ── バッジ ──
    function badgeHtml(status) {
      if (status === 'bookmarked') return '<span class="badge badge-bookmarked">★ ブックマーク</span>';
      return '<span class="badge badge-temporary">あとで読む</span>';
    }

    // ── サムネイル ──
    function thumbnailHtml(item) {
      if (item.thumbnail_url) {
        return `<img class="url-thumbnail" src="${escHtml(item.thumbnail_url)}" alt="" loading="lazy" onerror="this.replaceWith(placeholder())">`;
      }
      return `<div class="url-thumbnail-placeholder">🔗</div>`;
    }

    function placeholder() {
      const d = document.createElement('div');
      d.className = 'url-thumbnail-placeholder';
      d.textContent = '🔗';
      return d;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── カード描画 ──
    function renderCard(item) {
      const div = document.createElement('div');
      div.className = 'card url-card';
      div.dataset.id = item.id;
      div.dataset.status = item.status;

      const title = item.title || getDomain(item.url);
      const domain = getDomain(item.url);

      div.innerHTML = `
        <div class="url-card-header">
          ${thumbnailHtml(item)}
          <div class="url-card-body">
            <a class="url-card-title" href="${escHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escHtml(title)}</a>
            <div class="url-card-domain">${escHtml(domain)}</div>
          </div>
        </div>
        ${item.description ? `<div class="url-card-desc">${escHtml(item.description)}</div>` : ''}
        <div class="url-card-footer">
          ${badgeHtml(item.status)}
          <div class="url-card-actions">
            ${item.status === 'temporary'
              ? `<button class="btn btn-warn btn-sm action-bookmark" data-id="${escHtml(item.id)}" title="ブックマークに追加">★</button>`
              : `<button class="btn btn-ghost btn-sm action-unread" data-id="${escHtml(item.id)}" title="あとで読むに戻す">↩</button>`
            }
            <button class="btn btn-danger btn-sm action-delete" data-id="${escHtml(item.id)}" title="削除">✕</button>
          </div>
        </div>
      `;
      return div;
    }

    // ── スケルトン ──
    function renderSkeleton() {
      content.innerHTML = [1,2,3].map(() => `
        <div class="card skeleton-card">
          <div style="display:flex;gap:12px;">
            <div class="skeleton" style="width:64px;height:48px;border-radius:6px;flex-shrink:0;"></div>
            <div style="flex:1;">
              <div class="skeleton skeleton-row" style="width:80%;"></div>
              <div class="skeleton skeleton-row" style="width:50%;"></div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ── URL 読み込み ──
    async function loadUrls() {
      renderSkeleton();
      try {
        const res = await api.listUrls(currentStatus || undefined);
        if (!res) return;
        if (!res.ok) { showToast('読み込みに失敗しました', 'error'); return; }
        const data = await res.json();
        renderList(data.data ?? data);
      } catch {
        showToast('ネットワークエラー', 'error');
        content.innerHTML = '';
      }
    }

    function renderList(items) {
      content.innerHTML = '';
      if (!items.length) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📂</div>
            <div class="empty-state-text">URL がまだありません</div>
            <div class="empty-state-sub">右下の ＋ ボタンから追加できます</div>
          </div>`;
        return;
      }
      items.forEach(item => content.appendChild(renderCard(item)));
    }

    // ── アクション委譲 ──
    content.addEventListener('click', async (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const id = btn.dataset.id;

      if (btn.classList.contains('action-bookmark')) {
        await changeStatus(id, 'bookmarked', btn);
      } else if (btn.classList.contains('action-unread')) {
        // bookmarked → deleted のみ valid なので temporary には戻せない
        // ここは UI 上は出さないが念のため
        showToast('ブックマーク済みはあとで読むに戻せません', 'error');
      } else if (btn.classList.contains('action-delete')) {
        await deleteEntry(id, btn);
      }
    });

    async function changeStatus(id, status, btn) {
      setLoading(btn, true);
      try {
        const res = await api.updateStatus(id, status);
        if (!res) return;
        if (res.ok) {
          showToast('ステータスを変更しました', 'success');
          loadUrls();
        } else {
          showToast('変更に失敗しました', 'error');
          setLoading(btn, false);
        }
      } catch {
        showToast('ネットワークエラー', 'error');
        setLoading(btn, false);
      }
    }

    async function deleteEntry(id, btn) {
      setLoading(btn, true);
      try {
        const res = await api.deleteUrl(id);
        if (!res) return;
        if (res.ok) {
          showToast('削除しました', 'success');
          // アニメーションで消す
          const card = document.querySelector(`.url-card[data-id="${id}"]`);
          if (card) {
            card.style.transition = 'opacity .2s';
            card.style.opacity = '0';
            setTimeout(() => loadUrls(), 200);
          } else {
            loadUrls();
          }
        } else {
          showToast('削除に失敗しました', 'error');
          setLoading(btn, false);
        }
      } catch {
        showToast('ネットワークエラー', 'error');
        setLoading(btn, false);
      }
    }

    // ── URL 追加シート ──
    document.getElementById('fab').addEventListener('click', () => openSheet('add-sheet'));
    document.getElementById('add-cancel-btn').addEventListener('click', () => closeSheet('add-sheet'));
    document.getElementById('add-sheet').addEventListener('click', (e) => {
      if (e.target === document.getElementById('add-sheet')) closeSheet('add-sheet');
    });

    const addForm      = document.getElementById('add-form');
    const addSubmitBtn = document.getElementById('add-submit-btn');
    const addUrlError  = document.getElementById('add-url-error');
    const addFormError = document.getElementById('add-form-error');

    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      [addUrlError, addFormError].forEach(el => el.classList.remove('visible'));

      const url    = document.getElementById('add-url').value.trim();
      const status = document.querySelector('input[name="add-status"]:checked').value;

      if (!url) {
        addUrlError.textContent = 'URL を入力してください';
        addUrlError.classList.add('visible');
        return;
      }

      setLoading(addSubmitBtn, true);
      try {
        const res = await api.saveUrl(url, status);
        if (!res) return;

        if (res.ok) {
          closeSheet('add-sheet');
          addForm.reset();
          showToast('URL を保存しました', 'success');
          loadUrls();
        } else if (res.status === 409) {
          addUrlError.textContent = 'この URL はすでに登録されています';
          addUrlError.classList.add('visible');
        } else if (res.status === 422) {
          const data = await res.json();
          if (data.errors?.url) {
            addUrlError.textContent = data.errors.url[0];
            addUrlError.classList.add('visible');
          }
        } else {
          addFormError.textContent = '保存に失敗しました';
          addFormError.classList.add('visible');
        }
      } catch {
        addFormError.textContent = 'ネットワークエラーが発生しました';
        addFormError.classList.add('visible');
      } finally {
        setLoading(addSubmitBtn, false);
      }
    });

    // ── ログアウト ──
    document.getElementById('logout-btn').addEventListener('click', async () => {
      const btn = document.getElementById('logout-btn');
      setLoading(btn, true);
      try {
        await api.logout();
      } finally {
        location.href = '/';
      }
    });

    // ── 初期読み込み ──
    loadUrls();
  </script>
</body>
</html>
