services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/var/www/frontend
      - ./admin:/var/www/admin
      - ./backend:/var/www/backend
    depends_on:
      - php

  php:
    build:
      context: ./docker/php
      target: development
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - .env.db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlshare"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
